<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRO Audit System</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --ink:   #e2e8f0;
  --ink-2: #c8d0e0;
  --ink-3: #94a3b8;
  --ink-4: #8496af;
  --ink-5: #64748b;
  --paper:   #0e1018;
  --paper-2: #161925;
  --paper-3: #1e2235;
  --rule:   #252840;
  --rule-2: #363a55;
  --accent:    #6366f1;
  --accent-dk: #4338ca;
  --accent-positive:    #818cf8;
  --accent-positive-bg: rgba(129,140,248,0.12);
  --impact-high:        #f87171;
  --impact-high-bg:     rgba(248,113,113,0.12);
  --impact-medium:      #a78bfa;
  --impact-medium-bg:   rgba(167,139,250,0.12);
  --state-pass:    #86efac;
  --state-pass-bg: rgba(34,197,94,0.08);
  --state-fail:    #fca5a5;
  --state-fail-bg: rgba(248,113,113,0.08);
  --amber: #c8834a;
  --row-checked-bg: rgba(99,102,241,0.10);
  --shadow:    0 1px 3px rgba(0,0,0,0.4), 0 4px 16px rgba(0,0,0,0.25);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
}

[data-theme="light"] {
  --paper:   #ffffff;
  --paper-2: #ffffff;
  --paper-3: #f4f4f6;
  --row-checked-bg: rgba(99,102,241,0.05);
  --ink:   #0f0c2e;
  --ink-2: #1e1b4b;
  --ink-3: #312e81;
  --ink-4: #4c4a8e;
  --ink-5: #706ea0;
  --rule:   #e0e0e8;
  --rule-2: #c8c8d4;
  --accent-positive:    #4f46e5;
  --accent-positive-bg: rgba(99,102,241,0.10);
  --impact-high:        #dc2626;
  --impact-high-bg:     rgba(220,38,38,0.09);
  --impact-medium:      #6d28d9;
  --impact-medium-bg:   rgba(109,40,217,0.09);
  --state-pass:    #16a34a;
  --state-pass-bg: rgba(22,163,74,0.09);
  --state-fail:    #dc2626;
  --state-fail-bg: rgba(220,38,38,0.09);
  --shadow:    0 0 0 1px rgba(0,0,0,0.08);
  --shadow-lg: 0 0 0 1px rgba(0,0,0,0.08), 0 4px 14px rgba(0,0,0,0.07);
}

[data-theme="light"] body {
  font-weight: 500;
}
[data-theme="light"] .site-header__name,
[data-theme="light"] body *[style*="DM Serif"] {
  font-family: 'DM Sans', system-ui, sans-serif !important;
  font-weight: 800 !important;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ── SITE HEADER ── */
.site-header {
  background: var(--paper-2);
  border-bottom: 1px solid var(--rule);
  padding: 0 32px;
  height: 52px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.site-header__name {
  font-family: 'DM Serif Display', serif;
  font-size: 18px;
  font-weight: 400;
  letter-spacing: -0.2px;
}
.site-header__tag {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--ink-4);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.site-header__back {
  background: none;
  border: none;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-5);
  cursor: pointer;
  padding: 0;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: color 0.15s;
}
.site-header__back:hover { color: var(--ink-3); }
.site-header__theme-toggle {
  background: none;
  border: none;
  color: var(--ink-4);
  cursor: pointer;
  padding: 4px 6px;
  display: flex;
  align-items: center;
  transition: color 0.15s;
  margin-left: auto;
}
.site-header__theme-toggle:hover { color: var(--ink-2); }

/* ── DEMO BANNER ── */
.demo-banner {
  background: rgba(200,131,74,0.1);
  border-bottom: 1px solid rgba(200,131,74,0.3);
  padding: 8px 32px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--amber);
  letter-spacing: 0.04em;
  text-align: center;
}

/* ── BUTTONS ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 9px 18px;
  border: none;
  cursor: pointer;
  transition: opacity 0.15s;
  white-space: nowrap;
}
.btn:disabled { opacity: 0.3; cursor: not-allowed; }
.btn:not(:disabled):hover { opacity: 0.82; }
.btn-primary   { background: var(--accent); color: #fff; }
.btn-secondary { background: var(--paper-3); color: var(--ink-2); border: 1px solid var(--rule); }
.btn-ghost     { background: none; color: var(--ink-3); border: 1px solid var(--rule); }
.btn-danger    { background: var(--state-fail-bg); color: var(--state-fail); border: 1px solid rgba(252,165,165,0.2); }
.btn-lg  { padding: 13px 26px; font-size: 14px; }
.btn-sm  { padding: 6px 12px; font-size: 12px; }
.btn-full { width: 100%; justify-content: center; }

/* ── FIELDS ── */
.field { margin-bottom: 18px; }
.field:last-child { margin-bottom: 0; }
.field label {
  display: block;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-4);
  margin-bottom: 5px;
}
.field input, .field textarea, .field select {
  width: 100%;
  border: 1px solid var(--rule);
  background: var(--paper);
  padding: 9px 13px;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--ink);
  outline: none;
  transition: border-color 0.15s;
  appearance: none;
  -webkit-appearance: none;
  border-radius: 0;
}
.field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }
.field textarea { resize: vertical; min-height: 72px; line-height: 1.5; }
.field .hint { font-size: 11px; color: var(--ink-4); margin-top: 4px; font-family: 'DM Mono', monospace; }
.field-private label::after { content: ' — private'; font-weight: 400; color: var(--ink-5); text-transform: none; letter-spacing: 0; }

.fg2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.fg3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }
.fg4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 18px; }

/* ── CHECKLIST SIDEBAR ── */
.checklist-sidebar {
  width: 220px;
  flex-shrink: 0;
  background: var(--paper-2);
  border-right: 1px solid var(--rule);
  overflow-y: auto;
  display: none;
}
.checklist-sidebar.open { display: block; }
@media (min-width: 1024px) {
  .checklist-sidebar.open { width: 380px; }
}
@media (max-width: 700px) {
  .checklist-sidebar {
    position: fixed;
    left: 0;
    top: 46px;
    bottom: 0;
    width: calc(100% - 32px) !important;
    z-index: 400;
    display: block;
    transform: translateX(-100%);
    transition: transform 0.28s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .checklist-sidebar.open { transform: translateX(0); }
}
.sidebar-acc-btn {
  width: 100%;
  background: var(--paper-2);
  border: none;
  border-bottom: 1px solid var(--rule);
  padding: 9px 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  transition: background 0.12s;
  position: sticky;
  top: 0;
  z-index: 1;
}
.sidebar-acc-btn:hover { background: var(--paper-3); }
.sidebar-acc-btn.open  { background: var(--paper-3); border-left: 2px solid var(--accent); padding-left: 10px; }
.sidebar-item-btn {
  width: 100%;
  background: none;
  border: none;
  border-bottom: 1px solid var(--rule);
  padding: 8px 12px 8px 24px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: background 0.12s;
  text-align: left;
}
.sidebar-item-btn:hover { background: var(--paper-3); }
.sidebar-item-btn.active { background: var(--paper-3); border-left: 2px solid var(--accent); padding-left: 22px; }

/* ── MODAL OVERLAY ── */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 400;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 40px 16px;
  overflow-y: auto;
}
.modal-panel {
  background: var(--paper-2);
  border: 1px solid var(--rule-2);
  width: 100%;
  max-width: 640px;
  box-shadow: var(--shadow-lg);
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 24px;
  border-bottom: 1px solid var(--rule);
}
.modal-body { padding: 24px; }
.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--rule);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}
@keyframes modalSlideUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}
@media (max-width: 700px) {
  .modal-backdrop {
    padding: 0;
    overflow: hidden;
    background: transparent;
  }
  .modal-panel {
    position: fixed;
    inset: 0;
    max-width: 100%;
    border: none;
    border-radius: 0;
    display: flex;
    flex-direction: column;
    animation: modalSlideUp 0.28s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  .modal-panel > form {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .modal-header { flex-shrink: 0; }
  .modal-body {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .modal-footer {
    flex-shrink: 0;
    justify-content: stretch;
  }
  .modal-footer .btn { flex: 1; justify-content: center; padding: 14px; font-size: 11px; }
}

/* ── STAGE NAV BAR (bottom, all breakpoints) ── */
.mobile-bottom-bar {
  background: var(--paper-2);
  border-top: 1px solid var(--rule);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

/* ── PRINT ── */
@media print {
  * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  body { background: #fff !important; color: #111 !important; }
  .no-print, .site-header, .demo-banner, .mobile-bottom-bar { display: none !important; }
  .checklist-sidebar { display: none !important; }
  .print-section { page-break-inside: avoid; }
}

/* ── MOBILE ── */
@media (max-width: 700px) {
  .site-header { padding: 0 16px; height: 48px; }
  .site-header__tag { display: none; }
  .demo-banner { padding: 8px 16px; }
  .fg2, .fg3, .fg4 { grid-template-columns: 1fr; }
  .desktop-only { display: none !important; }
}
@media (min-width: 701px) {
  .mobile-only { display: none !important; }
}

/* ── NAV SHEET (mobile sections slide-up) ── */
.nav-sheet-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 500;
  cursor: pointer;
}
.nav-sheet-panel {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--paper-2);
  border-top: 2px solid var(--rule-2);
  z-index: 501;
  max-height: 76vh;
  display: flex;
  flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.28s cubic-bezier(0.16, 1, 0.3, 1);
}
.nav-sheet-panel.open { transform: translateY(0); }
.nav-sheet-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid var(--rule);
  flex-shrink: 0;
}
.nav-sheet-section-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border-bottom: 1px solid var(--rule);
  flex-shrink: 0;
}
.nav-sheet-sec-btn {
  background: none;
  border: none;
  border-right: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  padding: 10px 8px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  transition: background 0.12s;
}
.nav-sheet-sec-btn:nth-child(3n) { border-right: none; }
.nav-sheet-sec-btn:hover { background: var(--paper-3); }
.nav-sheet-sec-btn.active { background: var(--accent-bg); border-bottom: 2px solid var(--accent); }
.nav-sheet-items {
  overflow-y: auto;
  flex: 1;
}
.nav-sheet-item-btn {
  width: 100%;
  background: none;
  border: none;
  border-bottom: 1px solid var(--rule);
  padding: 12px 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: background 0.12s;
  text-align: left;
}
.nav-sheet-item-btn:hover { background: var(--paper-3); }
.nav-sheet-item-btn.active { background: var(--paper-3); border-left: 2px solid var(--accent); padding-left: 14px; }
.nav-sheet-acc-btn {
  width: 100%;
  background: none;
  border: none;
  border-bottom: 1px solid var(--rule);
  padding: 12px 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  transition: background 0.12s;
}
.nav-sheet-acc-btn:hover { background: var(--paper-3); }
.nav-sheet-acc-btn.open { background: var(--paper-3); border-left: 2px solid var(--accent); padding-left: 14px; }

/* Checklist card — reduce bottom padding on mobile since nav is outside the scroll area */
@media (max-width: 700px) {
  .checklist-card-scroll { padding-bottom: 20px !important; }
}

/* Audit list view — tighter top padding on mobile */
@media (max-width: 700px) {
  .audits-main { padding-top: 20px !important; }
}

/* Calculator metric grid — 1 col on mobile */
@media (max-width: 700px) {
  .calc-metrics { grid-template-columns: 1fr !important; }
}
/* Proposal summary rows — stack on mobile */
@media (max-width: 700px) {
  .proposal-row { flex-direction: column !important; align-items: flex-start !important; gap: 6px !important; }
  .proposal-val { text-align: left !important; }
}

/* Findings table / card responsive */
.findings-header { display: grid; grid-template-columns: 32px 1fr 80px 80px 100px; background: var(--paper-3); border-bottom: 1px solid var(--rule); padding: 8px 16px; }
.findings-row { display: grid; grid-template-columns: 32px 1fr 80px 80px 100px; border-bottom: 1px solid var(--rule); padding: 10px 16px; align-items: start; cursor: pointer; transition: background 0.12s; }
@media (min-width: 701px) {
  .findings-row-top, .findings-row-btm { display: contents; }
  .findings-lbl { display: none !important; }
}
@media (max-width: 700px) {
  .findings-header { display: none !important; }
  .findings-row { display: block !important; padding: 14px 16px; }
  .findings-row-top { display: flex !important; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
  .findings-row-btm { display: flex !important; align-items: center; gap: 14px; padding-left: 32px; flex-wrap: wrap; }
  .findings-cb { width: 22px !important; height: 22px !important; min-width: 22px !important; }
  .findings-cb-check { font-size: 13px !important; }
  .findings-col-lift, .findings-col-rev { text-align: left !important; }
  .findings-lbl { display: inline !important; }
}
@keyframes cardGlow {
  0%   { border-color: var(--rule);   box-shadow: none; }
  25%  { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.18); }
  100% { border-color: var(--rule);   box-shadow: none; }
}
.card-glow { animation: cardGlow 900ms ease-out forwards; }
</style>
<script>(function(){var t=localStorage.getItem('cro-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>

<body>
<div id="root"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="audit-items.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ── SUPABASE AUTH ──
// Replace these placeholders with your project values from supabase.com → Project Settings → API
const SUPABASE_URL      = 'https://wnwcpgqyenredfuhkhlx.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_oakmrMU0If3qwd2xpIvhGg_TZuUBTN3';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── THEME CONFIG ──
const THEME = {
  product: { name: 'CRO Audit System', tagline: 'Shopify Conversion Audit', version: 'v1' },
  storage: { key: 'liftkit-audits-v1' },
  limits: { maxActiveAudits: 5, maxPreChecked: 10, liftCapMin: 3.0, liftCapMax: 6.0 },
  copy: {
    status:       { pass: 'Pass', fail: 'Fail', tbd: 'TBD', na: 'N/A' },
    statusReport: { pass: 'Passed', fail: 'Issue Found', tbd: 'Not Assessed', na: 'Not Applicable' },
    demoNotice:   'Demo mode — nothing is saved. Refresh to start over.',
    workspaceFull: 'Workspace full. Archive a completed audit to free a slot.',
  },
};

const demoMode = /\/demo(\/|$)/.test(window.location.pathname);

// ── DATA ──
const SECTION_ORDER = ['General','Collection Page','Product Page','Cart','Checkout','Mobile/Performance'];
const SECTION_SHORT = {'General':'General','Collection Page':'Collection','Product Page':'Product','Cart':'Cart','Checkout':'Checkout','Mobile/Performance':'Mobile'};

const SECTIONS = SECTION_ORDER.map(s => ({
  id: s.toLowerCase().replace(/[^a-z]/g, '-').replace(/-+/g, '-'),
  label: s,
  short: SECTION_SHORT[s],
  items: AUDIT_ITEMS.filter(i => i.section === s),
}));

// ── STORAGE ──
const defaultStore = () => ({ audits: {}, last_auditor_name: null });
function initStore() {
  if (demoMode) return defaultStore();
  try {
    const raw = localStorage.getItem(THEME.storage.key);
    if (raw) {
      const parsed = JSON.parse(raw);
      return { audits: {}, last_auditor_name: parsed.last_auditor_name ?? null };
    }
  } catch {}
  return defaultStore();
}

// ── HELPERS ──
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function today() { return new Date().toISOString().slice(0,10); }
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d + 'T12:00:00').toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
}
function fmt(n) { return Math.round(n).toLocaleString(); }
function fmtPct(n) { return n.toFixed(2) + '%'; }

function newAudit(lastAuditorName) {
  const id = genId();
  const now = new Date().toISOString();
  return {
    id,
    client_info: {
      client_name: 'New Client', auditor_name: lastAuditorName || '',
      store_url: '', shopify_theme: '', audit_date: today(),
      monthly_revenue: 0, aov: 0, cvr: 0,
    },
    items: {},
    pricing: { audit_fee: 0, impl_fee: 0, hourly_rate: 0, est_hours: 0 },
    calculator_selections: null,
    created_at: now, updated_at: now,
  };
}

function getItemState(audit, itemId) {
  const item = AUDIT_ITEMS.find(i => i.id === itemId);
  const saved = audit?.items?.[itemId] || {};
  return {
    status:         saved.status         ?? 'tbd',
    finding:        saved.finding        !== undefined ? saved.finding        : (item?.default_finding || ''),
    recommendation: saved.recommendation !== undefined ? saved.recommendation : (item?.default_recommendation || ''),
    notes:          saved.notes          ?? '',
    screenshot_url: saved.screenshot_url ?? '',
  };
}

function auditProgress(audit) {
  const c = { pass:0, fail:0, tbd:0, na:0 };
  for (const item of AUDIT_ITEMS) c[getItemState(audit, item.id).status]++;
  return c;
}

function downloadJSON(data, filename) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

// ── SUPABASE DB HELPERS ──
async function fetchAuditsFromDB(userId) {
  const { data, error } = await _supabase
    .from('audits')
    .select('id, data, created_at, updated_at')
    .eq('user_id', userId)
    .order('created_at', { ascending: false });
  if (error) throw error;
  const audits = {};
  (data || []).forEach(row => {
    audits[row.id] = { ...row.data, id: row.id, created_at: row.created_at, updated_at: row.updated_at };
  });
  return audits;
}

async function upsertAuditToDB(userId, audit) {
  const { error } = await _supabase.from('audits').upsert({
    id: audit.id,
    user_id: userId,
    data: audit,
    updated_at: audit.updated_at,
  });
  if (error) throw error;

async function deleteAuditFromDB(auditId) {
  const { error } = await _supabase.from('audits').delete().eq('id', auditId);
  if (error) throw error;
}

function preCheckItems(audit) {
  const IMPACT_RANK = { High: 0, Medium: 1, Low: 2 };
  const EFFORT_RANK = { Low: 0, Medium: 1, High: 2 };
  const failItems = AUDIT_ITEMS.filter(i => getItemState(audit, i.id).status === 'fail');
  const sorted = [...failItems].sort((a, b) => {
    if (IMPACT_RANK[a.impact] !== IMPACT_RANK[b.impact]) return IMPACT_RANK[a.impact] - IMPACT_RANK[b.impact];
    if (EFFORT_RANK[a.effort] !== EFFORT_RANK[b.effort]) return EFFORT_RANK[a.effort] - EFFORT_RANK[b.effort];
    return AUDIT_ITEMS.indexOf(a) - AUDIT_ITEMS.indexOf(b);
  });
  return new Set(sorted.slice(0, THEME.limits.maxPreChecked).map(i => i.id));
}

function calcROI(audit, checkedIds) {
  const ci = audit.client_info || {};
  const revenue = parseFloat(ci.monthly_revenue) || 0;
  const aov     = parseFloat(ci.aov) || 85;
  const cvrRaw  = parseFloat(ci.cvr) || 1.8;
  const cvr     = cvrRaw / 100;
  const sessions = revenue > 0 ? revenue / (aov * cvr) : 0;

  const ids = checkedIds instanceof Set ? Array.from(checkedIds) : (checkedIds || []);
  let totalMin = 0, totalMax = 0;
  for (const id of ids) {
    const item = AUDIT_ITEMS.find(i => i.id === id);
    if (!item) continue;
    totalMin += item.lift_min;
    totalMax += item.lift_max;
  }
  const totalMid = (totalMin + totalMax) / 2;
  const { liftCapMin: CAP_MIN, liftCapMax: CAP_MAX } = THEME.limits;
  const cappedMin = Math.min(totalMin, CAP_MIN);
  const cappedMax = Math.min(totalMax, CAP_MAX);
  const cappedMid = Math.min(totalMid, (CAP_MIN + CAP_MAX) / 2);

  const newCVR          = cvr + cappedMid / 100;
  const newRevenue      = sessions * aov * newCVR;
  const monthlyRecovery = newRevenue - revenue;
  const annualRecovery  = monthlyRecovery * 12;

  const pr = audit.pricing || {};
  const auditFee       = parseFloat(pr.audit_fee)  || 0;
  const implFee        = parseFloat(pr.impl_fee)   || 0;
  const hourlyRate     = parseFloat(pr.hourly_rate) || 0;
  const estHours       = parseFloat(pr.est_hours)  || 0;
  const totalInvestment = auditFee + implFee;
  const roiMultiple    = totalInvestment > 0 ? annualRecovery / totalInvestment : 0;
  const paybackMonths  = totalInvestment > 0 && monthlyRecovery > 0 ? totalInvestment / monthlyRecovery : 0;

  let highCount = 0;
  for (const id of ids) {
    if (AUDIT_ITEMS.find(i => i.id === id)?.impact === 'High') highCount++;
  }
  const highRatio      = ids.length ? highCount / ids.length : 0;
  const suggestedPct   = highRatio >= 0.5 ? 20 : highRatio >= 0.25 ? 15 : 10;
  const suggestedFee   = annualRecovery > 0 ? Math.round(annualRecovery * suggestedPct / 100) : 0;
  const sanityCheck    = hourlyRate > 0 && estHours > 0
    ? (implFee >= hourlyRate * estHours * 0.9 ? 'pass' : implFee >= hourlyRate * estHours * 0.6 ? 'warn' : 'fail')
    : 'neutral';

  return {
    revenue, aov, cvrRaw, cvr, sessions,
    cappedMin, cappedMax, cappedMid,
    newCVR, newRevenue, monthlyRecovery, annualRecovery,
    auditFee, implFee, hourlyRate, estHours, totalInvestment,
    roiMultiple, paybackMonths,
    highCount, suggestedPct, suggestedFee, sanityCheck,
    hasData: revenue > 0 && sessions > 0,
  };
}

                        {isMenuOpen && (
                          <div style={{ position:'absolute', right:0, top:'100%', marginTop:2, background:'var(--paper-3)',
                            border:'1px solid var(--rule-2)', zIndex:200, minWidth:160, boxShadow:'0 8px 24px rgba(0,0,0,0.4)' }}
                            onMouseLeave={() => setMenuOpen(null)}>
                            {[
                              { label:'Duplicate', action:() => { onDuplicate(audit.id); setMenuOpen(null); } },
                              { label:'Archive & Export', action:() => { onArchive(audit.id); setMenuOpen(null); } },

                              <button key={item.label} onClick={item.action}
                                style={{ display:'block', width:'100%', textAlign:'left', padding:'10px 14px',

                                onMouseEnter={e => e.currentTarget.style.background='var(--paper-2)'}
                                onMouseLeave={e => e.currentTarget.style.background='none'}>
                                {item.label}
                              </button>
                            ))}
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                  {/* Row 2: index + progress · status + [date desktop] + Open button */}
                  <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                    <span style={{ fontFamily:"'DM Mono',monospace", fontSize:11, color:'var(--ink-5)',
                      letterSpacing:'0.06em', flexShrink:0 }}>
                      {String(idx + 1).padStart(2,'0')}
                    </span>
                    <span style={{ fontFamily:"'DM Mono',monospace", fontSize:11, letterSpacing:'0.04em' }}>
                      <span style={{ color: pct === 100 ? 'var(--state-pass)' : 'var(--ink-3)' }}>{done}/{total}</span>
                      <span style={{ color:'var(--ink-5)' }}>{' · '}</span>
                      <span style={{ color:'var(--ink-5)' }}>{pct === 0 ? 'not started' : pct === 100 ? 'complete' : `${pct}% done`}</span>
                    </span>
                    <div style={{ flex:1 }} />
                    <div className="desktop-only" style={{ fontFamily:"'DM Mono',monospace", fontSize:10, color:'var(--ink-5)',
                      letterSpacing:'0.04em', textAlign:'right' }}>
                      <div style={{ textTransform:'uppercase' }}>Updated</div>
                      <div style={{ color:'var(--ink-4)', marginTop:1 }}>{formatDate(audit.updated_at)}</div>
                    </div>
                    <button onClick={() => onOpen(audit.id)}
                      style={{ background:'var(--accent)', color:'#fff', border:'none', padding:'8px 18px',
                        fontFamily:"'DM Sans',sans-serif", fontSize:12, fontWeight:600, letterSpacing:'0.05em',
                        textTransform:'uppercase', cursor:'pointer', flexShrink:0 }}>
                      Open

                  </div>
                </div>
              </div>

        </div>

      {/* Cap message */}
      {!demoMode && atCap && (
        <div style={{ marginTop:20, padding:'14px 18px', background:'var(--paper-3)', border:'1px solid var(--rule)',
          fontFamily:"'DM Mono',monospace", fontSize:11, color:'var(--ink-4)', letterSpacing:'0.04em', lineHeight:1.6 }}>
          {THEME.copy.workspaceFull}
        </div>
      )}

      {/* Import */}
      {!demoMode && (
        <>
          <input ref={importRef} type="file" accept=".json" style={{display:'none'}} onChange={handleImportFile} />
          <div style={{ marginTop:24, display:'flex', gap:10 }}>
            <button onClick={() => !atCap && importRef.current?.click()} disabled={atCap}
              style={{ background:'none', border:'1px solid var(--rule)',
                color: atCap ? 'var(--ink-5)' : 'var(--ink-4)', padding:'8px 16px',
                fontFamily:"'DM Mono',monospace", fontSize:11, letterSpacing:'0.06em', textTransform:'uppercase',
                cursor: atCap ? 'not-allowed' : 'pointer', opacity: atCap ? 0.5 : 1 }}>
              Import JSON
            </button>
          </div>
        </>
      )}
    </main>
    {listClientInfoId && store.audits[listClientInfoId] && (
      <ClientInfoOverlay
        audit={store.audits[listClientInfoId]}
        lastAuditorName={store.last_auditor_name}
        onSave={(data) => { onSaveClientInfo(listClientInfoId, data); setListClientInfoId(null); }}
        onClose={() => setListClientInfoId(null)} />
    )}
    </React.Fragment>
  );
}

                <div className="field">
                  <label>Client Name *</label>
                  <CIInput value={form.client_name} onChange={v => set('client_name', v)} placeholder="Acme Boards Co." />
                </div>
                <div className="field">
                  <label>Auditor Name *</label>
                  <CIInput value={form.auditor_name} onChange={v => set('auditor_name', v)} placeholder="Your name" />
                </div>
              </div>
              <div className="fg3">
                <div className="field">
                  <label>Store URL</label>
                  <CIInput value={form.store_url} onChange={v => set('store_url', v)} placeholder="example.myshopify.com" />
                </div>
                <div className="field">

                <div className="field">
                  <label>Audit Date</label>

            </div>

              <div style={{ fontFamily:"'DM Mono',monospace", fontSize:10, letterSpacing:'0.1em', textTransform:'uppercase',
                color:'var(--ink-5)', marginBottom:12 }}>Store Metrics</div>
              <div className="fg4">
                <div className="field">
                  <label>Monthly Revenue ($)</label>

function ChecklistStage({ audit, onUpdateItem, onScrollToFindings, onContextChange, cardGlowTrigger }) {
  const [activeItemId, setActiveItemId] = useState(SECTIONS[0].items[0].id);
  const [openSections, setOpenSections] = useState(new Set([SECTIONS[0].id]));
  const sidebarRef = useRef(null);
  const [showDetails, setShowDetails] = useState(false);
  const [showNotes, setShowNotes] = useState(false);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [cardGlowing, setCardGlowing] = useState(false);

  useEffect(() => {
    if (!cardGlowTrigger) return;
    setCardGlowing(true);
    const t = setTimeout(() => setCardGlowing(false), 950);
    return () => clearTimeout(t);
  }, [cardGlowTrigger]);

  useEffect(() => {
    const sidebar = sidebarRef.current;
    if (!sidebar) return;
    function onScroll() {
      const { scrollTop, scrollHeight, clientHeight } = sidebar;
      if (scrollTop + clientHeight >= scrollHeight - 8) {
        setOpenSections(prev => {
          const lastOpenIdx = SECTIONS.reduce((max, s, i) => prev.has(s.id) ? i : max, -1);
          if (lastOpenIdx >= 0 && lastOpenIdx < SECTIONS.length - 1) {
            return new Set([...prev, SECTIONS[lastOpenIdx + 1].id]);
          }
          return prev;
        });
      }
    }
    sidebar.addEventListener('scroll', onScroll, { passive: true });
    return () => sidebar.removeEventListener('scroll', onScroll);
  }, []);

  const cardRef = useRef(null);
  const touchStartX = useRef(null);
  const touchStartY = useRef(null);

  const activeItem = AUDIT_ITEMS.find(i => i.id === activeItemId) || AUDIT_ITEMS[0];
  const activeSection = SECTIONS.find(s => s.items.some(i => i.id === activeItemId));
  const sectionItems = activeSection ? activeSection.items : [];
  const sectionItemIdx = sectionItems.findIndex(i => i.id === activeItemId);

  useEffect(() => {
    onContextChange?.({ short: activeSection?.short || '', idx: sectionItemIdx + 1, len: sectionItems.length });
  }, [activeItemId]);
  const itemState = getItemState(audit, activeItemId);
  const isFail = itemState.status === 'fail';

  const prog = auditProgress(audit);
  const totalDone = prog.pass + prog.fail + prog.na;
  const totalPct = Math.round((totalDone / 60) * 100);
  const anyMarked = totalDone > 0;

  const updateItem = useCallback((field, value) => {
    onUpdateItem(audit.id, activeItemId, { [field]: value });
  }, [audit.id, activeItemId, onUpdateItem]);

  const allItemsFlat = SECTIONS.flatMap(s => s.items);
  const activeIdx = allItemsFlat.findIndex(i => i.id === activeItemId);
  const prevItem = activeIdx > 0 ? allItemsFlat[activeIdx - 1] : null;
  const nextItem = activeIdx < allItemsFlat.length - 1 ? allItemsFlat[activeIdx + 1] : null;

  function goTo(item) {
    setActiveItemId(item.id);
    const sec = SECTIONS.find(s => s.items.some(i => i.id === item.id));
    if (sec) setOpenSections(prev => new Set([...prev, sec.id]));
    setShowDetails(false);
    setShowNotes(false);
    setSidebarOpen(false);
    if (cardRef.current) cardRef.current.scrollTop = 0;
  }

  useEffect(() => {
    function handleKey(e) {
      const tag = e.target.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
      if (e.key === 'ArrowLeft'  && prevItem) goTo(prevItem);
      if (e.key === 'ArrowRight' && nextItem) goTo(nextItem);
    }
    window.addEventListener('keydown', handleKey);
    return () => window.removeEventListener('keydown', handleKey);
  }, [activeItemId]);

  const statusDot = (itemId) => {
    const s = (audit.items || {})[itemId]?.status;
    if (!s || s === 'tbd') return { color:'var(--rule-2)', border:true };
    if (s === 'pass') return { color:'var(--state-pass)', border:false };
    if (s === 'fail') return { color:'var(--state-fail)', border:false };
    return { color:'var(--ink-5)', border:false };
  };

  const sectionDone = (sec) => sec.items.filter(i => {
    const s = (audit.items || {})[i.id]?.status;
    return s && s !== 'tbd';
  }).length;

  const IMPACT_COLOR = { High:'var(--impact-high)', Medium:'var(--impact-medium)', Low:'var(--ink-3)' };
  const IMPACT_BG    = { High:'var(--impact-high-bg)', Medium:'var(--impact-medium-bg)', Low:'var(--paper-3)' };

  const STATUS_OPTS = [
    { id:'pass', label:'Pass', color:'var(--state-pass)',  bg:'var(--state-pass-bg)',  border:'#86efac' },
    { id:'fail', label:'Fail', color:'var(--state-fail)',  bg:'var(--state-fail-bg)',  border:'#fca5a5' },
    { id:'tbd',  label:'TBD',  color:'var(--ink-3)',       bg:'var(--paper-3)',         border:'var(--rule-2)' },
    { id:'na',   label:'N/A',  color:'var(--ink-5)',       bg:'var(--paper)',            border:'var(--rule)' },
  ];

  const truncate = (str, n=24) => str && str.length > n ? str.slice(0,n) + '…' : str;

  return (
    <div data-stage="checklist" style={{ display:'flex', flexDirection:'column', flex:1, minHeight:0, overflow:'hidden' }}>
      {/* Stage header bar */}
      <div style={{ background:'var(--paper-2)', borderBottom:'1px solid var(--rule)', flexShrink:0 }}>
        <div style={{ padding:'10px 20px', display:'flex', alignItems:'center', gap:12 }}>
          <button onClick={() => setSidebarOpen(v => !v)}
            style={{ background:'none', border:'1px solid var(--rule)',
              color: sidebarOpen ? 'var(--accent)' : 'var(--ink-4)',
              fontFamily:"'DM Mono',monospace", fontSize:9, letterSpacing:'0.08em',
              textTransform:'uppercase', padding:'5px 10px', cursor:'pointer',
              display:'flex', alignItems:'center', gap:5 }}>
            <span>≡</span><span>{sidebarOpen ? 'Hide' : 'Sections'}</span>
          </button>
          <span style={{ fontFamily:"'DM Mono',monospace", fontSize:9, letterSpacing:'0.12em', textTransform:'uppercase',
            color:'#fff', background:'var(--accent)', padding:'2px 8px' }}>01 — Checklist</span>
          <span style={{ fontFamily:"'DM Mono',monospace", fontSize:10, color:'var(--ink-4)', letterSpacing:'0.04em' }}>
            {totalDone}/60 assessed
          </span>
          <div style={{ width:80, height:2, background:'var(--rule)', position:'relative', marginLeft:4 }} className="desktop-only">
            <div style={{ position:'absolute', left:0, top:0, height:'100%', background:'var(--accent)',
              width:`${totalPct}%`, transition:'width 0.4s' }} />
          </div>
        </div>
        <div className="mobile-only" style={{ height:2, background:'var(--rule)' }}>
          <div style={{ height:'100%', width:`${totalPct}%`, background:'var(--accent)', transition:'width 0.4s' }} />
        </div>
      </div>

      {/* Sidebar + card */}
      <div style={{ display:'flex', flex:1, overflow:'hidden', minHeight:0 }}>
        {/* Mobile sidebar backdrop */}
        {sidebarOpen && (
          <div className="mobile-only" onClick={() => setSidebarOpen(false)}
            style={{ position:'fixed', top:46, left:0, right:0, bottom:0, zIndex:399, background:'rgba(0,0,0,0.55)', cursor:'pointer' }} />
        )}
        {/* Sidebar */}
        <div ref={sidebarRef} className={`checklist-sidebar${sidebarOpen ? ' open' : ''}`}>
          {SECTIONS.map(sec => {
            const isOpen = openSections.has(sec.id);
            const done = sectionDone(sec);
            return (
              <div key={sec.id}>
                <button className={`sidebar-acc-btn${isOpen ? ' open' : ''}`}
                  onClick={() => setOpenSections(prev => { const n = new Set(prev); n.has(sec.id) ? n.delete(sec.id) : n.add(sec.id); return n; })}>
                  <span style={{ fontFamily:"'DM Mono',monospace", fontSize:10, letterSpacing:'0.08em',
                    textTransform:'uppercase', color: isOpen ? 'var(--ink-2)' : 'var(--ink-5)' }}>
                    {sec.short}
                  </span>
                  <span style={{ display:'flex', alignItems:'center', gap:6, flexShrink:0 }}>
                    <span style={{ fontFamily:"'DM Mono',monospace", fontSize:10,
                      color: done === sec.items.length ? 'var(--state-pass)' : 'var(--ink-5)' }}>
                      {done}/{sec.items.length}
                    </span>
                    <span style={{ fontFamily:"'DM Mono',monospace", fontSize:8, color:'var(--ink-5)',
                      transform: isOpen ? 'rotate(180deg)' : 'none', transition:'transform 0.15s', display:'inline-block' }}>▼</span>
                  </span>
                </button>
                {isOpen && sec.items.map((item, idx) => {
                  const isActive = item.id === activeItemId;
                  const dot = statusDot(item.id);
                  return (
                    <button key={item.id} className={`sidebar-item-btn${isActive ? ' active' : ''}`}
                      onClick={() => goTo(item)}>
                      <span style={{ width:7, height:7, borderRadius:'50%', background:dot.color, flexShrink:0,
                        border: dot.border ? '1px solid var(--rule-2)' : 'none' }} />
                      <span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:11,
                        color: isActive ? 'var(--ink)' : 'var(--ink-4)', lineHeight:1.3, flex:1,
                        overflow:'hidden', display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical' }}>
                        {item.name}
                      </span>
                      <span style={{ fontFamily:"'DM Mono',monospace", fontSize:9, color:'var(--ink-5)', flexShrink:0 }}>
                        {idx + 1}
                      </span>
                    </button>
                  );
                })}
              </div>
            );
          })}
        </div>

        {/* Item card */}
        <div ref={cardRef} className="checklist-card-scroll" style={{ flex:1, padding:'16px 20px 80px', overflowY:'auto', minWidth:0, minHeight:0 }}
          onTouchStart={e => { touchStartX.current = e.touches[0].clientX; touchStartY.current = e.touches[0].clientY; }}
          onTouchEnd={e => {
            if (touchStartX.current === null) return;
            const dx = e.changedTouches[0].clientX - touchStartX.current;
            const dy = Math.abs(e.changedTouches[0].clientY - touchStartY.current);
            touchStartX.current = null; touchStartY.current = null;
            if (dy > 60 || Math.abs(dx) < 50) return;
            if (dx < 0 && nextItem) goTo(nextItem);
            if (dx > 0 && prevItem) goTo(prevItem);
          }}>
          <div style={{ maxWidth:600, margin:'0 auto', display:'flex', flexDirection:'column', gap:2 }}>

            {/* Item header */}
            <div className={cardGlowing ? 'card-glow' : undefined}>
              {(() => {
                const colonIdx = activeItem.name.indexOf(':');
                if (colonIdx === -1) return (
                  <h2 style={{ fontFamily:"'DM Serif Display',serif", fontSize:19, fontWeight:400, color:'var(--ink)',
                    letterSpacing:'-0.3px', lineHeight:1.25, marginBottom:10 }}>
                    {activeItem.name}
                  </h2>
                );
                const before = activeItem.name.slice(0, colonIdx);
                const after = activeItem.name.slice(colonIdx + 1).trim();
                return (
                  <>
                    <h2 style={{ fontFamily:"'DM Serif Display',serif", fontSize:19, fontWeight:400, color:'var(--ink)',
                      letterSpacing:'-0.3px', lineHeight:1.25, marginBottom:4 }}>
                      {before}:
                    </h2>
                    <p style={{ fontFamily:"'DM Sans',sans-serif", fontSize:14, color:'var(--ink-3)',
                      lineHeight:1.35, marginBottom:10 }}>
                      {after}
                    </p>
                  </>
                );
              })()}
              <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:5, marginBottom:10 }}>
                {STATUS_OPTS.map(opt => {
                  const active = itemState.status === opt.id;
                  return (
                    <button key={opt.id} onClick={() => updateItem('status', opt.id)}
                      style={{ padding:'12px 6px', background: active ? opt.bg : 'var(--paper-3)',
                        border:`1px solid ${active ? opt.border : 'var(--rule)'}`,
                        color: active ? opt.color : 'var(--ink-5)',
                        fontFamily:"'DM Mono',monospace", fontSize:12, fontWeight: active ? 600 : 400,
                        letterSpacing:'0.06em', textTransform:'uppercase', cursor:'pointer', transition:'all 0.12s' }}>
                      {opt.label}
                    </button>
                  );
                })}
              </div>
              <div style={{ display:'flex', gap:5, flexWrap:'wrap', alignItems:'center', marginBottom:10 }}>
                <span style={{ fontFamily:"'DM Mono',monospace", fontSize:10, padding:'2px 8px',
                  background:IMPACT_BG[activeItem.impact], color:IMPACT_COLOR[activeItem.impact],
                  letterSpacing:'0.04em', textTransform:'uppercase' }}>{activeItem.impact}</span>
                <span style={{ fontFamily:"'DM Mono',monospace", fontSize:10, padding:'2px 8px',
                  background:'var(--paper-3)', color:'var(--ink-4)', letterSpacing:'0.04em', textTransform:'uppercase' }}>
                  Effort: {activeItem.effort}
                </span>
                <span style={{ fontFamily:"'DM Mono',monospace", fontSize:10, padding:'2px 8px',
                  background:'var(--paper-3)', color:'var(--ink-4)', letterSpacing:'0.04em', textTransform:'uppercase' }}>
                  {activeItem.estimated_fix_time}
                </span>
                <span style={{ fontFamily:"'DM Mono',monospace", fontSize:10, padding:'2px 8px',
                  background:'var(--paper-3)', color:'var(--accent-positive)', letterSpacing:'0.04em' }}>
                  +{activeItem.lift_min}–{activeItem.lift_max}% CVR
                </span>
              </div>
              <button onClick={() => setShowDetails(v => !v)}
                style={{ background:'none', border:'none', color:'var(--ink-5)', fontFamily:"'DM Mono',monospace",
                  fontSize:10, letterSpacing:'0.06em', textTransform:'uppercase', cursor:'pointer', padding:0,
                  display:'flex', alignItems:'center', gap:5 }}>
                <span style={{ transform:showDetails ? 'rotate(180deg)' : 'none', display:'inline-block',
                  transition:'transform 0.15s', fontSize:8 }}>▼</span>
                {showDetails ? 'Hide details' : 'Details'}
              </button>
              {showDetails && (
                <div style={{ marginTop:10, display:'grid', gridTemplateColumns:'1fr 1fr', gap:6 }}>
                  {[['Impact Area', activeItem.impact_area], ['Shopify Complexity', activeItem.shopify_fix_complexity]].map(([lbl, val]) => (
                    <div key={lbl} style={{ background:'var(--paper-3)', padding:'8px 10px' }}>
                      <div style={{ fontFamily:"'DM Mono',monospace", fontSize:9, letterSpacing:'0.1em',
                        textTransform:'uppercase', color:'var(--ink-5)', marginBottom:3 }}>{lbl}</div>

function FindingsStage({ audit, checkedIds, setCheckedIds }) {
  const failItems = AUDIT_ITEMS.filter(i => getItemState(audit, i.id).status === 'fail');

  useEffect(() => {
    if (checkedIds === null && failItems.length > 0) {
      setCheckedIds(preCheckItems(audit));
    }
  }, []);

  const ids = checkedIds || new Set();
  const toggle = (id) => setCheckedIds(prev => {
    const next = new Set(prev);
    next.has(id) ? next.delete(id) : next.add(id);
    return next;
  });

  const IMPACT_COLOR = { High:'var(--impact-high)', Medium:'var(--impact-medium)', Low:'var(--ink-3)' };
  const IMPACT_BG    = { High:'var(--impact-high-bg)', Medium:'var(--impact-medium-bg)', Low:'var(--paper-3)' };

  const roi = calcROI(audit, ids);

  return (
    <div data-stage="findings">
      {/* Sticky stage header bar */}
      <div style={{ position:'sticky', top:0, zIndex:10, background:'var(--paper-2)',
        borderBottom:'1px solid var(--rule)', padding:'10px 20px',
        display:'flex', alignItems:'center', gap:12 }}>
        <span style={{ fontFamily:"'DM Mono',monospace", fontSize:9, letterSpacing:'0.12em', textTransform:'uppercase',
          color:'#fff', background:'var(--accent)', padding:'2px 8px' }}>02 — Findings</span>
        <span style={{ fontFamily:"'DM Mono',monospace", fontSize:10, color:'var(--ink-5)', letterSpacing:'0.04em' }}>
          {failItems.length} issue{failItems.length !== 1 ? 's' : ''} found · {ids.size} selected for ROI
        </span>
      </div>

      <div style={{ maxWidth:840, margin:'0 auto', padding:'32px 24px 60px' }}>
      <h2 style={{ fontFamily:"'DM Serif Display',serif", fontSize:26, fontWeight:400, color:'var(--ink)',
        letterSpacing:'-0.4px', marginBottom:6 }}>Issues found</h2>
      <p style={{ fontFamily:"'DM Sans',sans-serif", fontSize:13, color:'var(--ink-4)', lineHeight:1.6,
        marginBottom:28 }}>
        Select which issues to include in the ROI calculation. Top 10 are pre-selected by impact and effort.
      </p>

      {failItems.length === 0 ? (
        <div style={{ border:'1px solid var(--rule)', padding:'40px 24px', textAlign:'center', background:'var(--paper-2)',
          fontFamily:"'DM Sans',sans-serif", fontSize:14, color:'var(--ink-4)' }}>
          No failures marked yet — go back to the checklist and mark items as Fail.
        </div>
      ) : (
        <div style={{ border:'1px solid var(--rule)' }}>
          {/* Table header — hidden on mobile via .findings-header CSS */}
          <div className="findings-header">
            {['', 'Issue', 'Impact', 'CVR Lift', 'Monthly +'].map((h, i) => (
              <div key={i} style={{ fontFamily:"'DM Mono',monospace", fontSize:9, letterSpacing:'0.1em',
                textTransform:'uppercase', color:'var(--ink-5)', textAlign: i >= 3 ? 'right' : 'left' }}>{h}</div>
            ))}
          </div>
          {failItems.map(item => {
            const checked = ids.has(item.id);
            const itemState = getItemState(audit, item.id);
            const ci = audit.client_info || {};
            const revenue = parseFloat(ci.monthly_revenue) || 0;
            const aov = parseFloat(ci.aov) || 85;
            const cvrRaw = parseFloat(ci.cvr) || 1.8;
            const sessions = revenue > 0 ? revenue / (aov * (cvrRaw / 100)) : 0;
            const midLift = (item.lift_min + item.lift_max) / 2 / 100;
            const monthlyImpact = sessions * aov * midLift;
            return (
              <div key={item.id}
                className="findings-row"
                style={{ background: checked ? 'var(--row-checked-bg)' : 'var(--paper-2)' }}
                onClick={() => toggle(item.id)}
                onMouseEnter={e => { if (!checked) e.currentTarget.style.background='var(--paper-3)'; }}
                onMouseLeave={e => { if (!checked) e.currentTarget.style.background='var(--paper-2)'; }}>
                {/* Top section: checkbox + issue name. Desktop: display:contents (grid cols 1–2). Mobile: flex row. */}
                <div className="findings-row-top">
                  <div style={{ paddingTop:2, flexShrink:0 }}>
                    <div className="findings-cb" style={{ width:16, height:16, border:`2px solid ${checked ? 'var(--accent)' : 'var(--rule-2)'}`,
                      background: checked ? 'var(--accent)' : 'transparent', display:'flex',
                      alignItems:'center', justifyContent:'center', transition:'all 0.12s' }}>
                      {checked && <span className="findings-cb-check" style={{ color:'#fff', fontSize:10, lineHeight:1 }}>✓</span>}
                    </div>
                  </div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:13, color:'var(--ink-2)',
                      lineHeight:1.3, marginBottom:3 }}>{item.name}</div>
                    {itemState.finding && (
                      <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:11, color:'var(--ink-4)',
                        lineHeight:1.4 }}>{itemState.finding}</div>
                    )}
                  </div>
                </div>
                {/* Bottom section: impact + lift + revenue. Desktop: display:contents (grid cols 3–5). Mobile: flex row indented. */}
                <div className="findings-row-btm">
                  <div>
                    <span style={{ fontFamily:"'DM Mono',monospace", fontSize:10, padding:'2px 7px',
                      background:IMPACT_BG[item.impact], color:IMPACT_COLOR[item.impact],
                      letterSpacing:'0.04em', textTransform:'uppercase' }}>{item.impact}</span>
                  </div>
                  <div className="findings-col-lift" style={{ fontFamily:"'DM Mono',monospace", fontSize:11, color:'var(--accent-positive)',
                    textAlign:'right', letterSpacing:'0.04em' }}>
                    <span className="findings-lbl" style={{ fontFamily:"'DM Mono',monospace", fontSize:9,
                      color:'var(--ink-5)', letterSpacing:'0.08em', textTransform:'uppercase', marginRight:3 }}>CVR </span>
                    +{item.lift_min}–{item.lift_max}%
                  </div>
                  <div className="findings-col-rev" style={{ fontFamily:"'DM Mono',monospace", fontSize:11,
                    color: revenue > 0 ? 'var(--state-pass)' : 'var(--ink-5)',
                    textAlign:'right', letterSpacing:'0.04em' }}>
                    <span className="findings-lbl" style={{ fontFamily:"'DM Mono',monospace", fontSize:9,
                      color:'var(--ink-5)', letterSpacing:'0.08em', textTransform:'uppercase', marginRight:3 }}>Mo. </span>
                    {revenue > 0 ? `+$${fmt(monthlyImpact)}` : '—'}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Quick summary */}
      {failItems.length > 0 && ids.size > 0 && (
        <div style={{ marginTop:24, fontFamily:"'DM Mono',monospace", fontSize:11, color:'var(--ink-4)',
          letterSpacing:'0.04em' }}>
          {roi.hasData
            ? `${ids.size} issues · est. +$${fmt(roi.monthlyRecovery)}/mo · capped at ${roi.cappedMax.toFixed(1)}% CVR lift`
            : `${ids.size} issues selected`}
        </div>
      )}
      </div>
    </div>
  );
}

function CalculatorStage({ audit, checkedIds, onUpdatePricing }) {
  const ids = checkedIds || new Set();
  const roi = calcROI(audit, ids);
  const pr = audit.pricing || {};
  const failCount = AUDIT_ITEMS.filter(i => getItemState(audit, i.id).status === 'fail').length;

  function setPricing(k, v) { onUpdatePricing(audit.id, { ...pr, [k]: parseFloat(v) || 0 }); }

  const metricCell = (label, value, sub) => (
    <div style={{ background:'var(--paper-3)', border:'1px solid var(--rule)', padding:'16px 20px' }}>

        color:'var(--ink-5)', marginBottom:6 }}>{label}</div>
      <div style={{ fontFamily:"'DM Serif Display',serif", fontSize:26, color:'var(--ink)',
        letterSpacing:'-0.5px', lineHeight:1 }}>{value}</div>
      {sub && <div style={{ fontFamily:"'DM Mono',monospace", fontSize:10, color:'var(--ink-4)', marginTop:4 }}>{sub}</div>}
    </div>
  );

  const sanityColor = { pass:'var(--state-pass)', warn:'var(--amber)', fail:'var(--impact-high)', neutral:'var(--ink-4)' };

  return (
    <div data-stage="calculator">
      {/* Sticky stage header bar */}
      <div style={{ position:'sticky', top:0, zIndex:10, background:'var(--paper-2)',
        borderBottom:'1px solid var(--rule)', padding:'10px 20px',
        display:'flex', alignItems:'center', gap:12 }}>
        <span style={{ fontFamily:"'DM Mono',monospace", fontSize:9, letterSpacing:'0.12em', textTransform:'uppercase',
          color:'#fff', background:'var(--accent)', padding:'2px 8px' }}>03 — Calculator</span>
        {!roi.hasData && (
          <span style={{ fontFamily:"'DM Mono',monospace", fontSize:10, color:'var(--amber)', letterSpacing:'0.04em' }}>
            Add store metrics in Client Info to unlock

      <div style={{ maxWidth:840, margin:'0 auto', padding:'32px 24px 60px' }}>
      <h2 style={{ fontFamily:"'DM Serif Display',serif", fontSize:26, fontWeight:400, color:'var(--ink)',
        letterSpacing:'-0.4px', marginBottom:32 }}>Revenue impact</h2>

      {/* Revenue Impact Grid */}
      <div className="calc-metrics" style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:2, marginBottom:2 }}>
        {metricCell('Monthly Sessions', roi.hasData ? fmt(roi.sessions) : '—', 'current visitors')}
        {metricCell('Current CVR', roi.hasData ? fmtPct(roi.cvrRaw) : '—', 'baseline')}
        {metricCell('Projected CVR', roi.hasData ? fmtPct(roi.newCVR * 100) : '—',
          roi.hasData ? `+${roi.cappedMid.toFixed(2)}% lift (capped)` : null)}
      </div>
      <div className="calc-metrics" style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:2, marginBottom:32 }}>

        {metricCell('Annual Recovery', roi.hasData ? `$${fmt(roi.annualRecovery)}` : '—', 'per year')}
        {metricCell('Client ROI', roi.hasData && roi.roiMultiple > 0 ? `${roi.roiMultiple.toFixed(1)}×` : '—',
          roi.hasData && roi.paybackMonths > 0 ? `payback in ${roi.paybackMonths.toFixed(1)} mo` : null)}
      </div>

      {/* Your Pricing — private, no-print */}
      <div className="no-print" style={{ border:'1px solid var(--rule)', marginBottom:32 }}>
        <div style={{ background:'var(--paper-3)', borderBottom:'1px solid var(--rule)', padding:'10px 20px',
          display:'flex', alignItems:'center', gap:8 }}>

            border:'1px solid var(--rule)', padding:'2px 7px' }}>Private</span>

            roi.hasData ? `$${fmt(roi.monthlyRecovery)}/month` : null],

            roi.totalInvestment > 0 ? `$${fmt(roi.totalInvestment)}` : '—',
            roi.auditFee > 0 || roi.implFee > 0
              ? `Audit $${fmt(roi.auditFee)} · Implementation $${fmt(roi.implFee)}`
              : 'Set fees in Your Pricing above'],
          ['Client ROI',
            roi.hasData && roi.roiMultiple > 0 ? `${roi.roiMultiple.toFixed(1)}× return` : '—',
            roi.hasData && roi.paybackMonths > 0 ? `payback in ${roi.paybackMonths.toFixed(1)} months` : null],
        ].map(([label, value, sub], i, arr) => (
          <div key={label}
            className="proposal-row"
            style={{ display:'flex', alignItems:'baseline', justifyContent:'space-between', padding:'14px 20px',
              borderBottom: i < arr.length - 1 ? '1px solid var(--rule)' : 'none',
              background:'var(--paper-2)', gap:16, flexWrap:'wrap' }}>
            <span style={{ fontFamily:"'DM Mono',monospace", fontSize:11, letterSpacing:'0.06em',
              textTransform:'uppercase', color:'var(--ink-4)', flexShrink:0 }}>{label}</span>
            <div className="proposal-val" style={{ textAlign:'right' }}>
              <div style={{ fontFamily:"'DM Serif Display',serif", fontSize:18, color:'var(--ink)',
                letterSpacing:'-0.3px' }}>{value}</div>
              {sub && <div style={{ fontFamily:"'DM Mono',monospace", fontSize:10, color:'var(--ink-5)', marginTop:2 }}>{sub}</div>}
            </div>
          </div>
        ))}
      </div>

      </div>
    </div>
  );
}

function ReportStage({ audit, checkedIds }) {
  const ids = checkedIds || new Set();
  const roi = calcROI(audit, ids);
  const ci = audit.client_info || {};
  const failItems = AUDIT_ITEMS.filter(i => getItemState(audit, i.id).status === 'fail' && ids.has(i.id));

  // Group fail items by section for report layout
  const failsBySec = SECTION_ORDER
    .map(sec => ({ label: sec, items: failItems.filter(i => i.section === sec) }))
    .filter(s => s.items.length > 0);

  const sectionCount = failsBySec.length;

  // Light report palette — independent of the dark app theme
  const r = {
    ink:    '#0f1117',
    ink2:   '#374151',
    ink3:   '#6b7280',
    ink4:   '#9ca3af',
    rule:   '#e5e7eb',
    rule2:  '#d1d5db',
    bg:     '#ffffff',
    bg2:    '#f9fafb',
    accent: '#6366f1',
    high:   '#dc2626', highBg: '#fef2f2',
    med:    '#7c3aed', medBg:  '#f5f3ff',
    low:    '#6b7280', lowBg:  '#f3f4f6',
  };

  const mono  = "'DM Mono', monospace";
  const serif = "'DM Serif Display', serif";
  const sans  = "'DM Sans', sans-serif";

  const impactColor = { High: r.high, Medium: r.med, Low: r.low };
  const impactBg    = { High: r.highBg, Medium: r.medBg, Low: r.lowBg };

  const pill = (text, color, bg) => (
    <span style={{ fontFamily:mono, fontSize:9, letterSpacing:'0.06em', textTransform:'uppercase',
      color, background:bg, padding:'3px 8px', border:`1px solid ${color}22`, whiteSpace:'nowrap' }}>
      {text}
    </span>
  );

  return (
    <div data-stage="report">
      {/* Sticky dark header bar — matches other stages */}
      <div style={{ position:'sticky', top:0, zIndex:10, background:'var(--paper-2)',
        borderBottom:'1px solid var(--rule)', padding:'10px 20px',
        display:'flex', alignItems:'center', gap:12 }}>
        <span style={{ fontFamily:mono, fontSize:9, letterSpacing:'0.12em', textTransform:'uppercase',
          color:'#fff', background:'var(--accent)', padding:'2px 8px' }}>04 — Report</span>
        <button onClick={() => window.print()} className="no-print"
          style={{ background:'none', border:'1px solid var(--rule)', color:'var(--ink-4)', padding:'6px 14px',
            fontFamily:mono, fontSize:10, letterSpacing:'0.06em', textTransform:'uppercase', cursor:'pointer' }}>
          Print / Export PDF
        </button>
        <a href={`swipe-file.html?store=${encodeURIComponent(ci.client_name||'')}&auditor=${encodeURIComponent(ci.auditor_name||'')}&rev=${encodeURIComponent(ci.monthly_revenue||'')}&roi=${encodeURIComponent(roi.hasData ? String(Math.round(roi.monthlyRecovery)) : '')}`}
          target="_blank" className="no-print"
          style={{ marginLeft:'auto', background:'none', border:'1px solid var(--rule)', color:'var(--ink-4)',
            padding:'6px 14px', fontFamily:mono, fontSize:10, letterSpacing:'0.06em', textTransform:'uppercase',
            textDecoration:'none', display:'inline-block' }}>
          Get closing scripts →
        </a>
      </div>

      {/* White paper body */}
      <div style={{ background: r.bg, minHeight:'100%' }}>
        <div style={{ maxWidth:760, margin:'0 auto', padding:'48px 32px 80px' }}>

          {/* ── COVER ── */}
          <div style={{ marginBottom:40 }}>
            <div style={{ fontFamily:mono, fontSize:10, letterSpacing:'0.14em', textTransform:'uppercase',
              color:r.ink3, marginBottom:20 }}>
              CRO Audit Report · For Shopify
            </div>
            <h1 style={{ fontFamily:serif, fontSize:52, fontWeight:400, color:r.ink,
              letterSpacing:'-1.2px', lineHeight:1, marginBottom:20 }}>
              {ci.client_name || 'Client'}
            </h1>
            <div style={{ display:'flex', gap:32, flexWrap:'wrap', marginBottom:24 }}>
              {[
                ['Date',   fmtDate(ci.audit_date)],
                ['Auditor', ci.auditor_name || '—'],
                ['Theme',   ci.shopify_theme || '—'],
                ...(ci.store_url ? [['URL', ci.store_url]] : []),
              ].map(([l, v]) => (
                <div key={l}>
                  <div style={{ fontFamily:mono, fontSize:9, letterSpacing:'0.1em',
                    textTransform:'uppercase', color:r.ink4, marginBottom:4 }}>{l}</div>
                  <div style={{ fontFamily:mono, fontSize:12, color:r.ink2 }}>{v}</div>
                </div>
              ))}
            </div>
            <div style={{ height:3, background:r.accent }} />
          </div>

          {/* ── REVENUE IMPACT SUMMARY ── */}
          <div style={{ marginBottom:40 }}>
            <div style={{ fontFamily:mono, fontSize:9, letterSpacing:'0.12em', textTransform:'uppercase',
              color:r.ink4, marginBottom:14 }}>Revenue Impact Summary</div>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)',
              border:`1px solid ${r.rule}`, borderBottom:'none' }}>
              {[
                ['Monthly Sessions', roi.hasData ? fmt(roi.sessions)         : '—', 'estimated'],
                ['Current CVR',      roi.hasData ? fmtPct(roi.cvrRaw)        : '—', 'baseline'],
                ['Projected CVR',    roi.hasData ? fmtPct(roi.cvrRaw + roi.cappedMid) : '—',
                  roi.hasData ? `+${roi.cappedMin.toFixed(1)}–${roi.cappedMax.toFixed(1)}% lift` : '—'],
                ['Monthly Recovery', roi.hasData ? `$${fmt(roi.monthlyRecovery)}` : '—', 'per month'],
                ['Annual at Risk',   roi.hasData ? `$${fmt(roi.annualRecovery)}`  : '—', 'if issues persist'],
                ['Issues Found',     failItems.length, `across ${sectionCount} section${sectionCount !== 1 ? 's' : ''}`],
              ].map(([label, value, sub], i) => (
                <div key={label} style={{ padding:'20px 18px', borderRight: i % 3 < 2 ? `1px solid ${r.rule}` : 'none',
                  borderBottom:`1px solid ${r.rule}` }}>
                  <div style={{ fontFamily:mono, fontSize:9, letterSpacing:'0.1em', textTransform:'uppercase',
                    color:r.ink4, marginBottom:8 }}>{label}</div>
                  <div style={{ fontFamily:serif, fontSize:28, color:r.ink, letterSpacing:'-0.5px',
                    lineHeight:1, marginBottom:5 }}>{value}</div>
                  <div style={{ fontFamily:mono, fontSize:10, color:r.ink4 }}>{sub}</div>
                </div>
              ))}
            </div>
          </div>

          {/* ── ENGAGEMENT SUMMARY (proposal) ── */}
          {roi.hasData && (
            <div style={{ marginBottom:48, border:`1px solid ${r.rule}` }}>
              <div style={{ background:r.bg2, padding:'10px 18px', borderBottom:`1px solid ${r.rule}` }}>
                <span style={{ fontFamily:mono, fontSize:9, letterSpacing:'0.1em', textTransform:'uppercase',
                  color:r.ink3 }}>Engagement Summary</span>
              </div>
              {[
                ['Scope',         `60-point audit · ${failItems.length} findings · ${ids.size} prioritized`],
                ['CVR Lift',      `+${roi.cappedMin.toFixed(2)}–${roi.cappedMax.toFixed(2)}% (${roi.cappedMid.toFixed(2)}% mid)`],
                ['Annual Impact', `$${fmt(roi.annualRecovery)}`],
                ['Investment',    roi.totalInvestment > 0 ? `$${fmt(roi.totalInvestment)}` : 'TBD'],
                ['Client ROI',    roi.roiMultiple > 0 ? `${roi.roiMultiple.toFixed(1)}× · payback ${roi.paybackMonths.toFixed(1)} mo` : '—'],
              ].map(([l, v], i, arr) => (
                <div key={l} style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline',
                  padding:'12px 18px', borderBottom: i < arr.length - 1 ? `1px solid ${r.rule}` : 'none', gap:16 }}>
                  <span style={{ fontFamily:mono, fontSize:10, letterSpacing:'0.06em', textTransform:'uppercase',
                    color:r.ink3, flexShrink:0 }}>{l}</span>
                  <span style={{ fontFamily:serif, fontSize:16, color:r.ink, letterSpacing:'-0.2px',
                    textAlign:'right' }}>{v}</span>
                </div>
              ))}

          {/* ── FINDINGS grouped by section ── */}
          {failsBySec.length > 0 && (
            <div>
              <div style={{ fontFamily:mono, fontSize:9, letterSpacing:'0.12em', textTransform:'uppercase',
                color:r.ink4, marginBottom:24 }}>Findings</div>

              {failsBySec.map(({ label, items }) => (
                <div key={label} style={{ marginBottom:40 }}>
                  {/* Section header */}
                  <div style={{ fontFamily:mono, fontSize:11, letterSpacing:'0.08em', textTransform:'uppercase',
                    color:r.ink2, paddingBottom:8, borderBottom:`2px solid ${r.ink}`, marginBottom:20 }}>
                    {label}
                  </div>

                  {/* Finding cards */}
                  {items.map((item) => {
                    const state = getItemState(audit, item.id);
                    return (
                      <div key={item.id} style={{ marginBottom:24, paddingBottom:24,
                        borderBottom:`1px solid ${r.rule}` }} className="print-section">
                        {/* Item title + badges */}
                        <div style={{ marginBottom:14 }}>
                          <h3 style={{ fontFamily:serif, fontSize:20, fontWeight:400, color:r.ink,
                            letterSpacing:'-0.3px', lineHeight:1.25, marginBottom:10 }}>
                            {item.name}
                          </h3>
                          <div style={{ display:'flex', gap:5, flexWrap:'wrap' }}>
                            {pill(`${item.impact} Impact`, impactColor[item.impact], impactBg[item.impact])}
                            {pill(`+${item.lift_min}–${item.lift_max}% CVR Lift`, r.accent, '#eef2ff')}

                          </div>
                        </div>
                        {/* Finding */}
                        <div style={{ marginBottom:12 }}>
                          <div style={{ fontFamily:mono, fontSize:9, letterSpacing:'0.1em',

                        <div style={{ paddingLeft:14, borderLeft:`3px solid ${r.accent}` }}>

                          <p style={{ fontFamily:sans, fontSize:14, color:r.ink2, lineHeight:1.65, margin:0 }}>

          {/* Empty state */}

            <div style={{ padding:'48px 24px', textAlign:'center', border:`1px solid ${r.rule}`,

            </div>
