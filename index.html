        </div>
      </div>
    </div>
  );
}

function AuditWorkspace({ auditId, store, onUpdateItem, onUpdatePricing, onSaveClientInfo, onBack, theme, onToggleTheme }) {
  const audit = store.audits[auditId];
  const [clientInfoOpen, setClientInfoOpen] = useState(false);
  const [stageIndex, setStageIndex] = useState(0);
  const [checkedIds, setCheckedIds] = useState(null);
  const [checklistCtx, setChecklistCtx] = useState({ short: SECTIONS[0].short, idx: 1, len: SECTIONS[0].items.length });
  const [nameEditing, setNameEditing] = useState(false);
  const [nameDraft, setNameDraft] = useState('');
  const [cardGlowTrigger, setCardGlowTrigger] = useState(0);
  const nameInputRef = useRef(null);
  const nameCancelRef = useRef(false);

  useEffect(() => {
    const ci = store.audits[auditId]?.client_info || {};
    if (!ci.client_name || ci.client_name === 'New Client') {
      setNameDraft('');
      setNameEditing(true);
    }
  }, []);

  useEffect(() => {
    if (nameEditing && nameInputRef.current) nameInputRef.current.focus();
  }, [nameEditing]);

  if (!audit) return null;

  const ci = audit.client_info || {};
  const isSetupIncomplete = !ci.client_name || ci.client_name === 'New Client' || !ci.monthly_revenue || !ci.aov || !ci.cvr;

  function commitName() {
    const trimmed = nameDraft.trim();
    if (trimmed) {
      onSaveClientInfo(audit.id, {
        client_info: { ...ci, client_name: trimmed },
        pricing: audit.pricing,
      });
      setCardGlowTrigger(n => n + 1);
    }
    setNameEditing(false);
  }

  const STAGE_LABELS = ['01 — Checklist', '02 — Findings', '03 — Calculator', '04 — Report'];
  const NEXT_LABELS  = ['Review Findings', 'Calculate ROI', 'View Report', null];

  const SLIDE = 'transform 0.55s cubic-bezier(0.25,0.46,0.45,0.94)';
  const stageStyle = (n) => ({
    position:'absolute', inset:0,
    transition: SLIDE,
    transform: `translateY(calc((${n} - ${stageIndex}) * 100%))`,
    willChange: 'transform',
  });

  return (
    <div style={{ position:'fixed', inset:0, display:'flex', flexDirection:'column', background:'var(--paper)' }}>
      {/* Demo banner (inside fixed layout so it isn't obscured) */}
      {demoMode && <div className="demo-banner no-print">{THEME.copy.demoNotice}</div>}

      {/* Audit header */}
      <div style={{ background:'var(--paper-2)', borderBottom:'1px solid var(--rule)', padding:'0 32px',
        height:52, display:'flex', alignItems:'center', justifyContent:'space-between', gap:16,
        flexShrink:0, zIndex:90 }}>
        <div style={{ display:'flex', alignItems:'center', gap:16, minWidth:0 }}>
          <button onClick={onBack} className="site-header__back" title="Back to audits">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
            </svg>
          </button>
          <div style={{ display:'flex', alignItems:'center', gap:8, minWidth:0 }}>
            {nameEditing ? (
              <React.Fragment>
                <input
                  ref={nameInputRef}
                  value={nameDraft}
                  onChange={e => setNameDraft(e.target.value)}
                  onKeyDown={e => { if (e.key === 'Enter') { commitName(); } if (e.key === 'Escape') { nameCancelRef.current = true; setNameEditing(false); } }}
                  onBlur={() => { if (!nameCancelRef.current) commitName(); nameCancelRef.current = false; }}
                  placeholder="Client name..."
                  style={{ fontFamily:"'DM Serif Display',serif", fontSize:16, color:'var(--ink)',
                    letterSpacing:'-0.2px', background:'transparent', border:'none',
                    borderBottom:'1px solid var(--accent)', outline:'none', minWidth:80, width:180 }}
                />
                <button
                  onMouseDown={e => e.preventDefault()}
                  onClick={commitName}
                  style={{ fontFamily:"'DM Mono',monospace", fontSize:10, letterSpacing:'0.06em',
                    background:'var(--accent)', border:'none', color:'#fff', padding:'3px 8px',
                    cursor:'pointer', flexShrink:0 }}>
                  GO →
                </button>
              </React.Fragment>
            ) : (
              <React.Fragment>
                <span
                  onClick={() => { setNameDraft(ci.client_name === 'New Client' ? '' : (ci.client_name || '')); setNameEditing(true); }}
                  style={{ fontFamily:"'DM Serif Display',serif", fontSize:16, color:'var(--ink)',
                    letterSpacing:'-0.2px', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap',
                    cursor:'text' }}>
                  {ci.client_name || 'New Client'}
                </span>
                {isSetupIncomplete && (
                  <button
                    onClick={() => setClientInfoOpen(true)}
                    style={{ fontFamily:"'DM Mono',monospace", fontSize:9, letterSpacing:'0.08em',
                      textTransform:'uppercase', color:'var(--amber)', background:'rgba(200,131,74,0.1)',
                      border:'1px solid rgba(200,131,74,0.25)', padding:'2px 7px', whiteSpace:'nowrap',
                      flexShrink:0, cursor:'pointer' }}
                    className="desktop-only">
                    Setup incomplete
                  </button>
                )}
              </React.Fragment>
            )}
          </div>
        </div>
        <div style={{ display:'flex', gap:8, flexShrink:0 }}>
          <button onClick={() => setClientInfoOpen(true)}
            style={{ background:'none', border:'1px solid var(--rule)', color:'var(--ink-4)', padding:'6px 14px',
              fontFamily:"'DM Mono',monospace", fontSize:10, letterSpacing:'0.06em', textTransform:'uppercase',
              cursor:'pointer' }}>
            {isSetupIncomplete ? '+ Client Info' : 'Edit Info'}
          </button>
          {!demoMode && (
            <button onClick={() => {
              const name = (ci.client_name || 'audit').toLowerCase().replace(/\s+/g,'-');
              downloadJSON(audit, `cro-audit-${name}-${audit.id}.json`);
            }} style={{ background:'none', border:'1px solid var(--rule)', color:'var(--ink-4)', padding:'6px 14px',
              fontFamily:"'DM Mono',monospace", fontSize:10, letterSpacing:'0.06em', textTransform:'uppercase',
              cursor:'pointer' }} className="desktop-only">
              Export JSON
            </button>
          )}
          <ThemeToggle theme={theme} onToggle={onToggleTheme} />
        </div>
      </div>

      {/* Stage container — overflow hidden blocks manual scrolling; navigation is CTA-only */}
      <div style={{ flex:1, overflow:'hidden', position:'relative' }}>

        {/* Checklist — flex column so sidebar/card scroll independently */}
        <div data-stage="checklist" style={{ ...stageStyle(0), display:'flex', flexDirection:'column', overflow:'hidden' }}>
          <ChecklistStage audit={audit} onUpdateItem={onUpdateItem}
            onScrollToFindings={() => setStageIndex(1)}
            onContextChange={setChecklistCtx}
            cardGlowTrigger={cardGlowTrigger} />
        </div>

        {/* Findings */}
        <div data-stage="findings" style={{ ...stageStyle(1), overflowY:'auto' }}>
          <FindingsStage audit={audit} checkedIds={checkedIds} setCheckedIds={setCheckedIds} />
        </div>

        {/* Calculator */}
        <div data-stage="calculator" style={{ ...stageStyle(2), overflowY:'auto' }}>
          <CalculatorStage audit={audit} checkedIds={checkedIds} onUpdatePricing={onUpdatePricing} />
        </div>

        {/* Report */}
        <div data-stage="report" style={{ ...stageStyle(3), overflowY:'auto' }}>
          <ReportStage audit={audit} checkedIds={checkedIds} />
        </div>

      </div>

      {/* Stage nav bar — visible on all breakpoints */}
      <div className="mobile-bottom-bar no-print">
        <button onClick={stageIndex > 0 ? () => setStageIndex(stageIndex - 1) : onBack}
          style={{ background:'none', border:'1px solid var(--rule)', color:'var(--ink-3)', padding:'10px 18px',
            fontFamily:"'DM Sans',sans-serif", fontSize:12, fontWeight:600, letterSpacing:'0.06em',
            textTransform:'uppercase', cursor:'pointer', flexShrink:0 }}>
          ← Back
        </button>
        <div style={{ flex:1, display:'flex', justifyContent:'flex-start' }}>
          <span className="desktop-only" style={{ fontFamily:"'DM Mono',monospace", fontSize:10,
            color:'var(--ink-5)', letterSpacing:'0.04em' }}>
            {STAGE_LABELS[stageIndex]}
          </span>
        </div>
        {NEXT_LABELS[stageIndex] ? (
          <button onClick={() => setStageIndex(stageIndex + 1)}
            style={{ background:'var(--accent)', border:'none', color:'#fff', padding:'10px 22px',
              fontFamily:"'DM Sans',sans-serif", fontSize:12, fontWeight:600, letterSpacing:'0.06em',
              textTransform:'uppercase', cursor:'pointer', flexShrink:0 }}>
            {NEXT_LABELS[stageIndex]} →
          </button>
        ) : stageIndex === 3 ? (
          <button onClick={() => window.print()}
            style={{ background:'var(--accent)', border:'none', color:'#fff', padding:'10px 22px',
              fontFamily:"'DM Sans',sans-serif", fontSize:12, fontWeight:600, letterSpacing:'0.06em',
              textTransform:'uppercase', cursor:'pointer', flexShrink:0 }}>
            Print / Export PDF
          </button>
        ) : <div />}
      </div>

      {/* Client info overlay */}
      {clientInfoOpen && (
        <ClientInfoOverlay audit={audit} lastAuditorName={store.last_auditor_name}
          onSave={(data) => { onSaveClientInfo(audit.id, data); setClientInfoOpen(false); }}
          onClose={() => setClientInfoOpen(false)} />
      )}
    </div>
  );
}

function App() {
  const [store, setStore] = useState(initStore);
  const [appScreen, setAppScreen] = useState('list'); // 'list' | 'audit'
  const [activeAuditId, setActiveAuditId] = useState(null);
  const [theme, setTheme] = useState(() => localStorage.getItem('cro-theme') || 'dark');
  const [user, setUser] = useState(null);
  const [authLoading, setAuthLoading] = useState(!demoMode);
  const [auditsLoading, setAuditsLoading] = useState(!demoMode);
  const [dbError, setDbError] = useState(null);
  const [confirmDialog, setConfirmDialog] = useState(null);
  const saveTimers = useRef({});
  // Track updated_at of last-saved version per audit to skip unnecessary Supabase writes
  const savedAt = useRef({});

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    try { localStorage.setItem('cro-theme', theme); } catch {}
  }, [theme]);

  function toggleTheme() { setTheme(t => t === 'dark' ? 'light' : 'dark'); }

  useEffect(() => {
    if (demoMode) return;
    _supabase.auth.getUser().then(({ data: { user } }) => {
      setUser(user ?? null);
      setAuthLoading(false);
    });
    const { data: { subscription } } = _supabase.auth.onAuthStateChange((_event, session) => {
      setUser(session?.user ?? null);
      setAuthLoading(false);
    });
    return () => subscription.unsubscribe();
  }, []);

  async function handleSignOut() {
    await _supabase.auth.signOut();
  }

  // Persist last_auditor_name to localStorage (audits live in Supabase now)
  useEffect(() => {
    if (!demoMode) {
      try { localStorage.setItem(THEME.storage.key, JSON.stringify({ last_auditor_name: store.last_auditor_name })); } catch {}
    }
  }, [store.last_auditor_name]);

  // Load audits from Supabase after auth resolves
  useEffect(() => {
    if (demoMode || !user) return;
    setAuditsLoading(true);
    fetchAuditsFromDB(user.id)
      .then(audits => {
        Object.values(audits).forEach(a => { savedAt.current[a.id] = a.updated_at; });
        setStore(prev => ({ ...prev, audits }));
        setAuditsLoading(false);
      })
      .catch(err => {
        console.error('fetchAudits:', err);
        setDbError('Could not load audits. Check your connection.');
        setAuditsLoading(false);
      });
  }, [user?.id]);

  // Debounced save — only fires for audits whose updated_at changed since last save
  useEffect(() => {
    if (demoMode || !user) return;
    Object.values(store.audits).forEach(audit => {
      if (savedAt.current[audit.id] === audit.updated_at) return;
      clearTimeout(saveTimers.current[audit.id]);
      saveTimers.current[audit.id] = setTimeout(() => {
        upsertAuditToDB(user.id, audit)
          .then(() => { savedAt.current[audit.id] = audit.updated_at; })
          .catch(err => {
            console.error('upsertAudit:', err);
            setDbError('Save failed. Check your connection.');
          });
      }, 1500);
    });
  }, [store.audits]);

  function updateStore(fn) { setStore(prev => fn(prev)); }

  function handleDismissError() { setDbError(null); }

  async function handleNew() {
    if (!demoMode && Object.keys(store.audits).length >= THEME.limits.maxActiveAudits) return;
    const audit = newAudit(store.last_auditor_name);
    if (!demoMode) {
      try {
        await upsertAuditToDB(user.id, audit);
        savedAt.current[audit.id] = audit.updated_at;
      } catch (err) {
        setDbError(err.message?.includes('audit_limit_reached')
          ? THEME.copy.workspaceFull
          : 'Could not create audit. Check your connection.');
        return;
      }
    }
    updateStore(prev => ({ ...prev, audits: { ...prev.audits, [audit.id]: audit } }));
    setActiveAuditId(audit.id);
    setAppScreen('audit');
  }

  function handleOpen(id) {
    setActiveAuditId(id);
    setAppScreen('audit');
  }

  function handleArchive(id) {
    const audit = store.audits[id];
    const clientName = audit.client_info?.client_name || 'this audit';
    setConfirmDialog({
      title: 'Export & Delete',
      message: `"${clientName}" will be exported as a JSON file and removed from your workspace. You can reimport it later if you have an open slot.`,
      confirmLabel: 'Export & Delete',
      danger: true,
      onConfirm: async () => {
        const name = clientName.toLowerCase().replace(/\s+/g, '-');
        downloadJSON(audit, `cro-audit-${name}-${id}.json`);
        if (!demoMode) {
          try {
            await deleteAuditFromDB(id);
            delete savedAt.current[id];
          } catch (err) {
            setDbError('Delete failed. Check your connection.');
            return;
          }
        }
        updateStore(prev => { const { [id]: _, ...rest } = prev.audits; return { ...prev, audits: rest }; });
      },
    });
  }

  async function handleDuplicate(id) {
    if (!demoMode && Object.keys(store.audits).length >= THEME.limits.maxActiveAudits) {
      setDbError(THEME.copy.workspaceFull);
      return;
    }
    const audit = store.audits[id];
    const newId = genId();
    const now = new Date().toISOString();
    const dupeAudit = { ...audit, id: newId, created_at: now, updated_at: now,
      client_info: { ...audit.client_info }, items: { ...audit.items } };
    if (!demoMode) {
      try {
        await upsertAuditToDB(user.id, dupeAudit);
        savedAt.current[newId] = dupeAudit.updated_at;
      } catch (err) {
        setDbError(err.message?.includes('audit_limit_reached')
          ? THEME.copy.workspaceFull
          : 'Could not duplicate audit. Check your connection.');
        return;
      }
    }
    updateStore(prev => ({ ...prev, audits: { ...prev.audits, [newId]: dupeAudit } }));
  }

  function handleDelete(id) {
    const audit = store.audits[id];
    const clientName = audit.client_info?.client_name || 'this audit';
    setConfirmDialog({
      title: 'Delete Audit',
      message: `Delete "${clientName}"? This cannot be undone.`,
      confirmLabel: 'Delete',
      danger: true,
      onConfirm: async () => {
        if (!demoMode) {
          try {
            await deleteAuditFromDB(id);
            delete savedAt.current[id];
          } catch (err) {
            setDbError('Delete failed. Check your connection.');
            return;
          }
        }
        updateStore(prev => { const { [id]: _, ...rest } = prev.audits; return { ...prev, audits: rest }; });
        if (activeAuditId === id) { setActiveAuditId(null); setAppScreen('list'); }
      },
    });
  }

  async function handleImport(data) {
    if (!demoMode && Object.keys(store.audits).length >= THEME.limits.maxActiveAudits) {
      setDbError(THEME.copy.workspaceFull);
      return;
    }
    const newId = genId();
    const now = new Date().toISOString();
    const audit = { ...data, id: newId, updated_at: now };
    if (!demoMode) {
      try {
        await upsertAuditToDB(user.id, audit);
        savedAt.current[newId] = audit.updated_at;
      } catch (err) {
        setDbError(err.message?.includes('audit_limit_reached')
          ? THEME.copy.workspaceFull
          : 'Could not import audit. Check your connection.');
        return;
      }
    }
    updateStore(prev => ({ ...prev, audits: { ...prev.audits, [newId]: audit } }));
  }

  function handleUpdateItem(auditId, itemId, updates) {
    updateStore(prev => {
      const audit = prev.audits[auditId];
      return { ...prev, audits: { ...prev.audits, [auditId]: {
        ...audit, updated_at: new Date().toISOString(),
        items: { ...audit.items, [itemId]: { ...(audit.items[itemId] || {}), ...updates } },
      }}};
    });
  }

  function handleUpdatePricing(auditId, pricing) {
    updateStore(prev => {
      const audit = prev.audits[auditId];
      return { ...prev, audits: { ...prev.audits, [auditId]: {
        ...audit, updated_at: new Date().toISOString(), pricing,
      }}};
    });
  }

  function handleSaveClientInfo(auditId, { client_info, pricing }) {
    updateStore(prev => {
      const audit = prev.audits[auditId];
      return {
        ...prev,
        last_auditor_name: client_info.auditor_name,
        audits: { ...prev.audits, [auditId]: {
          ...audit, client_info, updated_at: new Date().toISOString(),
          pricing: { ...audit.pricing, audit_fee: pricing.audit_fee },
        }},
      };
    });
  }

  if (authLoading) return null;
  if (!demoMode && !user) return <LoginScreen />;

  if (appScreen === 'audit' && activeAuditId) {
    return (
      <>
        <AuditWorkspace
          auditId={activeAuditId}
          store={store}
          onUpdateItem={handleUpdateItem}
          onUpdatePricing={handleUpdatePricing}
          onSaveClientInfo={handleSaveClientInfo}
          onBack={() => setAppScreen('list')}
          theme={theme}
          onToggleTheme={toggleTheme}
        />
        <ConfirmDialog dialog={confirmDialog} onClose={() => setConfirmDialog(null)} />
      </>
    );
  }

  return (
    <>
      {demoMode && <div className="demo-banner">{THEME.copy.demoNotice}</div>}
      <SiteHeader theme={theme} onToggleTheme={toggleTheme} />
      <AuditList
        store={store}
        onNew={handleNew}
        onOpen={handleOpen}
        onArchive={handleArchive}
        onDuplicate={handleDuplicate}
        onDelete={handleDelete}
        onImport={handleImport}
        onSaveClientInfo={handleSaveClientInfo}
        user={user}
        onSignOut={handleSignOut}
        auditsLoading={auditsLoading}
        dbError={dbError}
        onDismissError={handleDismissError}
      />
      <ConfirmDialog dialog={confirmDialog} onClose={() => setConfirmDialog(null)} />
    </>
  );
}
// ─── END COMPONENTS C ───

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
